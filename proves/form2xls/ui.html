<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form2XLS</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Form2XLS</h1>
        <span id="status" class="status">Escanejant...</span>
      </div>

      <div class="card">
        <div class="card-title">Exportar</div>
        <p class="card-desc">
          Desa els camps del formulari en un fitxer CSV que pots obrir i editar
          amb Excel o LibreOffice Calc.
        </p>
        <button id="export-btn" class="btn btn-primary" disabled>
          Exportar CSV
        </button>
      </div>

      <div class="card">
        <div class="card-title">Importar</div>
        <p class="card-desc">
          Selecciona un CSV exportat prèviament per aplicar els seus valors al
          formulari.
        </p>
        <label class="file-label" id="file-label">
          <span id="file-label-text">Selecciona un fitxer CSV…</span>
          <input type="file" id="file-input" accept=".csv,text/csv" />
        </label>
        <div id="import-preview" class="import-preview" hidden>
          <span id="import-info"></span>
          <button id="apply-btn" class="btn btn-secondary">
            Aplicar valors
          </button>
        </div>
      </div>

      <div id="error" class="error" hidden></div>
    </div>
    <script src="ui.js"></script>
  </body>
</html>
